wayland.windowManager.hyprland = {
  enable = true;
  package = inputs.hyprland.packages.${system}.hyprland;
  settings = {
    "$mod" = "SUPER";

    monitor = ",preferred,auto,1";  # auto-detect your display

    exec-once = [
      "waybar"
      "hyprpaper"
      "dunst"
    ];

    general = {
      gaps_in = 5;
      gaps_out = 10;
      border_size = 2;
      "col.active_border" = "rgba(cba6f7ff)";   # Catppuccin mauve — swap later
      "col.inactive_border" = "rgba(6c7086ff)";
      layout = "dwindle";
    };

    decoration = {
      rounding = 10;
      blur = {
        enabled = true;
        size = 8;
        passes = 2;
      };
    };

    animations = {
      enabled = true;
    };

    input = {
      kb_layout = "us";
      follow_mouse = 1;
      touchpad.natural_scroll = true;
    };

    bind = [
      "$mod, Return, exec, kitty"
      "$mod, D, exec, wofi --show drun"
      "$mod, Q, killactive"
      "$mod, F, fullscreen"
      "$mod, Space, togglefloating"

      # Focus
      "$mod, H, movefocus, l"
      "$mod, L, movefocus, r"
      "$mod, K, movefocus, u"
      "$mod, J, movefocus, d"

      # Move windows
      "$mod SHIFT, H, movewindow, l"
      "$mod SHIFT, L, movewindow, r"
      "$mod SHIFT, K, movewindow, u"
      "$mod SHIFT, J, movewindow, d"

      # Workspaces
      "$mod, 1, workspace, 1"
      "$mod, 2, workspace, 2"
      "$mod, 3, workspace, 3"
      "$mod, 4, workspace, 4"
      "$mod, 5, workspace, 5"

      "$mod SHIFT, 1, movetoworkspace, 1"
      "$mod SHIFT, 2, movetoworkspace, 2"
      "$mod SHIFT, 3, movetoworkspace, 3"
      "$mod SHIFT, 4, movetoworkspace, 4"
      "$mod SHIFT, 5, movetoworkspace, 5"
    ];

    bindm = [
      "$mod, mouse:272, movewindow"    # Super + left drag = move
      "$mod, mouse:273, resizewindow"  # Super + right drag = resize
    ];
  };
};
